<body>
  <div id="app" class="app-shell">
    <section class="map-stage" aria-label="Mapa DVB-T/T2">
      <div id="map" class="map"></div>

      <form id="searchForm" class="search-card glass-panel" autocomplete="off">
        <span class="search-ico">⌕</span>
        <input id="searchInput" type="search" placeholder="Wpisz adres lub miejscowość" />
        <button type="submit" aria-label="Szukaj">OK</button>
      </form>

      <div class="chips-row">
        <button id="locationChip" class="chip main-chip" type="button">🏠 Mielec / punkt odbioru</button>
        <span class="chip version-chip">19.2 - 1705261518</span>
        <span id="onlineChip" class="chip online-chip">Online</span>
      </div>
      <span class="version-floating" aria-label="Wersja aplikacji">19.2 - 1705261518</span>

      <button id="locateBtn" class="locate-btn glass-panel" type="button" title="Użyj GPS">⌖</button>

      <button id="compassWidget" class="compass-widget glass-panel" type="button" title="Kompas anteny">
        <span class="compass-ring"><i id="targetNeedle"></i><i id="phoneNeedle"></i><b>N</b></span>
        <span class="compass-copy"><strong id="turnText">Kompas</strong><small id="headingText">Telefon: — · Cel: —</small></span>
      </button>

      <div class="map-actions">
        <button id="txListBtn" class="map-btn glass-panel" type="button" title="Nadajniki">📡</button>
        <button id="profileBtn" class="map-btn glass-panel" type="button" title="Profil terenu">▱</button>
        <button id="layersBtn" class="map-btn glass-panel" type="button" title="Warstwy">▤</button>
        <button id="filtersBtn" class="map-btn glass-panel" type="button" title="MUX-y">☰</button>
        <button id="dataBtn" class="map-btn glass-panel" type="button" title="Dane/API">⚙</button>
      </div>

      <button id="openStationBtn" class="floating-action" type="button" hidden>📡 Nadajnik</button>

      <aside id="appPanel" class="app-panel glass-panel collapsed" aria-label="Panel aplikacji">
        <div class="panel-handle"></div>
        <div class="panel-top-row">
          <div><h2 id="panelTitle">Nadajniki</h2><p id="panelSubtitle">Kliknij marker lub wybierz z listy.</p></div>
          <button id="closePanelBtn" class="icon-close" type="button">×</button>
        </div>
        <div id="panelContent" class="panel-content"></div>
      </aside>

      <section id="stationCard" class="station-card glass-panel" hidden>

        </div>
        <div class="station-grid">
          <div><span>Azymut</span><b id="stationAzimuth">—</b></div>
          <div><span>Odległość</span><b id="stationDistance">—</b></div>
          <div><span>Polaryzacja</span><b id="stationPol">—</b></div>
          <div><span>MUX</span><b id="stationMux">—</b></div>
        </div>
        <div class="station-actions">
          <button id="antennaBtn" class="primary" type="button">Ustaw antenę</button>
          <button id="stationProfileBtn" type="button">Profil</button>
